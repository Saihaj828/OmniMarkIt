# Render Blueprint — one-click free deploy of the OmniMarkIt backend + Postgres.
# In the Render dashboard: New → Blueprint → point at this repo.
services:
  - type: web
    name: omnimarkit-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: omnimarkit-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true
      # Set your real frontend origin after deploying the web app to Vercel:
      - key: FRONTEND_ORIGIN
        value: https://your-app.vercel.app
      # Optional integrations — paste real keys to activate:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CHECKR_API_KEY
        sync: false

databases:
  - name: omnimarkit-db
    plan: free
